name: Deploy Hugo site to GitHub Pages

# Builds the site on every push to main + on manual dispatch. Concurrency
# group prevents two concurrent deploys from racing each other (rare but
# possible if you push twice fast).

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Pin to the same Hugo version used locally (matches `hugo version`
      # output from your Mac Studio at bootstrap time). Bump deliberately.
      HUGO_VERSION: 0.161.1
    steps:
      - name: Install Hugo (extended)
        run: |
          wget -O /tmp/hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # PaperMod theme is a submodule
          fetch-depth: 0          # enableGitInfo needs full history

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          # Don't pass --baseURL — actions/configure-pages@v5 reports
          # the github.io URL, which overrides the custom-domain
          # baseURL from hugo.yaml + breaks all asset paths when
          # browsing at awesomo.blog. Let hugo.yaml's value win.
          hugo --gc --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
