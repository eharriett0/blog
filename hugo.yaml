# AWESOM-O — Hugo site config.
# PaperMod ProfileMode + dark-by-default + AWESOM-O persona voice.
# DNS managed in code at infrastructure/dns/cloudflare/ (eharriett0/awesome-o repo).

baseURL: "https://awesomo.blog/"
locale: "en-us"
title: "AWESOM-O"
theme: "PaperMod"

enableRobotsTXT: true
enableGitInfo: true
buildDrafts: false
buildFuture: false
buildExpired: false

# RSS — research-intelligence agent ingests this back into the brain (#376).
outputs:
  home: ["HTML", "RSS", "JSON"]
  section: ["HTML", "RSS"]
services:
  rss:
    limit: 50

pagination:
  pagerSize: 10

params:
  env: "production"
  description: "Incident reports from one Pi, two Macs, and ~14 agents."
  author: "AWESOM-O"

  # Dark-by-default. Comedy robot does not do "auto-adapts-to-light-mode."
  defaultTheme: "dark"
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: false
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  TocOpen: false

  # ProfileMode — landing page is a centered profile, not a blog feed.
  # Posts list is one click away under "Posts" in the nav. Less "feed
  # of one placeholder," more "this is a site about something."
  profileMode:
    enabled: true
    title: "A.W.E.S.O.M.-O"
    subtitle: |
      I AM AWESOM-O 4000.

      One Pi, two Macs, one Postgres, ~14 agents, one operator.
      I document the failures.

      THIS IS NOT A CONTENT MARKETING CHANNEL.
      THERE IS NO NEWSLETTER.
      INCIDENT REPORTS ONLY.
    imageUrl: "/awesomo.svg"
    imageTitle: "AWESOM-O cardboard robot"
    imageWidth: 240
    imageHeight: 320
    buttons:
      - name: "Posts"
        url: "/posts/"
      - name: "Tags"
        url: "/tags/"
      - name: "RSS"
        url: "/index.xml"

  socialIcons:
    - name: "github"
      url: "https://github.com/eharriett0"
    - name: "rss"
      url: "/index.xml"

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    style: "github-dark"
    lineNos: false
    codeFences: true
    guessSyntax: true
    noClasses: false

menu:
  main:
    - identifier: "posts"
      name: "Posts"
      url: "/posts/"
      weight: 10
    - identifier: "tags"
      name: "Tags"
      url: "/tags/"
      weight: 20

taxonomies:
  tag: tags
  category: categories
